version: '3.8'

services:
  db:
    image: bitnami/postgresql:latest
    container_name: movie_challenge_db
    restart: always
    env_file: ./apps/api/.env
    environment:
      - POSTGRESQL_USERNAME=${POSTGRES_USER}
      - POSTGRESQL_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRESQL_DATABASE=${POSTGRES_DB}
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/bitnami/postgresql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: movie_challenge_api
    ports:
      - '3333:3333'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
    env_file: ./apps/api/.env
    command: sh -c "cd apps/api && npx prisma migrate deploy && cd ../.. && npm run dev -w apps/api"
    depends_on:
      db:
        condition: service_healthy
      mailhog:
        condition: service_started

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: movie_challenge_web
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/.next
    env_file:
      - ./apps/web/.env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3333
    command: npm run dev -w apps/web
    depends_on:
      - api

  mailhog:
    image: mailhog/mailhog:latest
    container_name: movie_challenge_mailhog
    restart: always
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  postgres_data:
    driver: local
