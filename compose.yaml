services:
  db:
  image: bitnami/postgresql
  container_name: movie_challenge_db
  restart: always
  env_file:
    - ./apps/api/.env
  ports:
    - "5432:5432"
  volumes:
    - postgres_data:/bitnami/postgresql

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: movie_challenge_api
    ports:
      - "3333:3333"
    env_file:
      - ./apps/api/.env
    depends_on:
      - db

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: movie_challenge_web
    ports:
      - "3000:3000"
    env_file:
      - ./apps/web/.env
    depends_on:
      - api

volumes:
  postgres_data:
