services:
  db:
    image: bitnami/postgresql:latest
    container_name: movie_challenge_db
    restart: always
    env_file:
      - ./apps/api/.env
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/bitnami/postgresql

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: movie_challenge_api
    ports:
      - '3333:3333'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/api/node_modules
    env_file:
      - ./apps/api/.env
    command: npm run dev -w apps/api
    depends_on:
      - db
      - mailhog

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: movie_challenge_web
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - /app/node_modules
      - /app/apps/web/.next
    env_file:
      - ./apps/web/.env
    command: npm run dev -w apps/web
    depends_on:
      - api

  mailhog:
    image: mailhog/mailhog:latest
    container_name: movie_challenge_mailhog
    restart: always
    ports:
      - '1025:1025'
      - '8025:8025'

volumes:
  postgres_data:
    driver: local
